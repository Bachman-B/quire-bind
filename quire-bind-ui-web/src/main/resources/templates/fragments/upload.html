<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<th:block th:fragment="step">
    <!-- OOB step indicator update -->
    <div id="step-indicator" class="step-indicator">
        <div th:each="n : ${#numbers.sequence(1,4)}"
             th:classappend="${n == 1} ? 'active' : ''"
             class="step-dot">
            <span class="step-num" th:text="${n}">1</span>
            <span class="step-label" th:switch="${n}">
                <span th:case="1">Upload</span>
                <span th:case="2">Binding</span>
                <span th:case="3">Pages</span>
                <span th:case="4">Export</span>
            </span>
        </div>
        <div class="step-line"></div>
    </div>

    <div class="step-card">
        <h2 class="step-title">Load Source</h2>
        <p class="step-description">Add one or more PDFs. They will be combined in the order listed.</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!-- Source list (shown when at least one PDF is loaded) -->
        <div th:if="${not #lists.isEmpty(sources)}" class="source-list">
            <table class="source-table">
                <thead>
                    <tr>
                        <th class="col-drag"></th>
                        <th class="col-num">#</th>
                        <th class="col-name">File</th>
                        <th class="col-pages">Pages</th>
                        <th class="col-action"></th>
                    </tr>
                </thead>
                <tbody id="source-tbody">
                    <tr th:each="src, iter : ${sources}"
                        draggable="true"
                        th:attr="data-index=${iter.index}"
                        class="source-row">
                        <td class="col-drag drag-handle" title="Drag to reorder">⠿</td>
                        <td class="col-num" th:text="${iter.index + 1}">1</td>
                        <td class="col-name" th:text="${src.filename}">document.pdf</td>
                        <td class="col-pages" th:text="${src.pageCount}">0</td>
                        <td class="col-action">
                            <form th:if="${not iter.first}"
                                  hx-post="/wizard/upload/move-up"
                                  hx-vals='{"index": "__${iter.index}__"}'
                                  hx-target="#wizard-content"
                                  hx-swap="innerHTML"
                                  style="display:inline">
                                <button type="submit" class="btn btn-icon-small" title="Move up">↑</button>
                            </form>
                            <form th:if="${not iter.last}"
                                  hx-post="/wizard/upload/move-down"
                                  hx-vals='{"index": "__${iter.index}__"}'
                                  hx-target="#wizard-content"
                                  hx-swap="innerHTML"
                                  style="display:inline">
                                <button type="submit" class="btn btn-icon-small" title="Move down">↓</button>
                            </form>
                            <form hx-post="/wizard/upload/remove"
                                  hx-vals='{"index": "__${iter.index}__"}'
                                  hx-target="#wizard-content"
                                  hx-swap="innerHTML"
                                  style="display:inline">
                                <button type="submit" class="btn btn-danger-small">✕</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Add PDF form -->
        <form hx-post="/wizard/upload"
              hx-encoding="multipart/form-data"
              hx-target="#wizard-content"
              hx-swap="innerHTML"
              hx-indicator=".upload-indicator"
              class="add-pdf-form">

            <div class="field-group">
                <label for="pdf-input" class="field-label"
                       th:text="${#lists.isEmpty(sources)} ? 'PDF file' : 'Add another PDF'">PDF file</label>
                <div class="file-input-row">
                    <input id="pdf-input" type="file" name="pdf" accept=".pdf"
                           th:required="${#lists.isEmpty(sources)}"
                           class="file-input"/>
                    <button type="submit" class="btn btn-secondary"
                            th:text="${#lists.isEmpty(sources)} ? 'Add PDF' : 'Add PDF'">Add PDF</button>
                </div>
            </div>

            <div class="upload-indicator htmx-indicator">
                <span class="spinner"></span> Uploading…
            </div>
        </form>

        <!-- Continue button (only shown once at least one source is loaded) -->
        <div th:if="${not #lists.isEmpty(sources)}" class="step-actions">
            <span></span>
            <form hx-post="/wizard/upload/continue"
                  hx-target="#wizard-content"
                  hx-swap="innerHTML"
                  style="display:inline">
                <button type="submit" class="btn btn-primary">Next →</button>
            </form>
        </div>
    </div>

    <script th:if="${not #lists.isEmpty(sources)}">
    (function () {
        let dragFrom = null;
        const tbody = document.getElementById('source-tbody');
        if (!tbody) return;

        tbody.addEventListener('dragstart', function (e) {
            const row = e.target.closest('.source-row');
            if (!row) return;
            dragFrom = parseInt(row.dataset.index);
            row.classList.add('dragging');
        });
        tbody.addEventListener('dragover', function (e) {
            const row = e.target.closest('.source-row');
            if (!row) return;
            e.preventDefault();
            tbody.querySelectorAll('.source-row').forEach(r => r.classList.remove('drag-over'));
            if (parseInt(row.dataset.index) !== dragFrom) row.classList.add('drag-over');
        });
        tbody.addEventListener('dragleave', function (e) {
            const row = e.target.closest('.source-row');
            if (row) row.classList.remove('drag-over');
        });
        tbody.addEventListener('drop', function (e) {
            const row = e.target.closest('.source-row');
            tbody.querySelectorAll('.source-row').forEach(r => r.classList.remove('dragging', 'drag-over'));
            if (!row || dragFrom === null) { dragFrom = null; return; }
            e.preventDefault();
            const dragTo = parseInt(row.dataset.index);
            if (dragFrom === dragTo) { dragFrom = null; return; }
            fetch('/wizard/upload/reorder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'HX-Request': 'true' },
                body: new URLSearchParams({ from: dragFrom, to: dragTo })
            }).then(r => r.text()).then(html => {
                document.getElementById('wizard-content').innerHTML = html;
                htmx.process(document.getElementById('wizard-content'));
            });
            dragFrom = null;
        });
        tbody.addEventListener('dragend', function () {
            tbody.querySelectorAll('.source-row').forEach(r => r.classList.remove('dragging', 'drag-over'));
            dragFrom = null;
        });
    })();
    </script>
</th:block>

</body>
</html>
