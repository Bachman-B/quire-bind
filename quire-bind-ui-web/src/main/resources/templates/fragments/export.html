<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<th:block th:fragment="step">
    <!-- OOB step indicator update -->
    <div id="step-indicator" class="step-indicator">
        <div th:each="n : ${#numbers.sequence(1,4)}"
             th:classappend="${n == 4} ? 'active' : 'done'"
             class="step-dot">
            <span class="step-num" th:text="${n}">1</span>
            <span class="step-label" th:switch="${n}">
                <span th:case="1">Upload</span>
                <span th:case="2">Binding</span>
                <span th:case="3">Pages</span>
                <span th:case="4">Export</span>
            </span>
        </div>
        <div class="step-line"></div>
    </div>

    <div class="step-card step-card--wide">
        <h2 class="step-title">Export</h2>
        <p class="step-description">
            Configure output marks and page numbering, then download the imposed PDF.
        </p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="export-layout">

            <!-- Left: Output Marks -->
            <section class="export-section">
                <h3 class="section-label">Output marks</h3>
                <label class="checkbox-label">
                    <input type="checkbox" form="export-form" name="foldLines"
                           th:checked="${ws.foldLines}"/> Fold lines
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" form="export-form" name="stitchMarks"
                           th:checked="${ws.stitchMarks}"/> Stitch marks
                </label>

                <!-- Sewing holes with expandable config -->
                <div class="sewing-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="sewingHolesCheck" form="export-form"
                               name="sewingHoles" th:checked="${ws.sewingHoles}"
                               onchange="setSewingParamsVisible(this.checked)"/>
                        Sewing holes
                    </label>
                    <div id="sewingParams" class="sewing-params"
                         th:style="${ws.sewingHoles} ? '' : 'display:none'">
                        <div class="sewing-mode-row">
                            <label class="radio-label">
                                <input type="radio" form="export-form" name="sewingStyle"
                                       value="SIMPLE"
                                       th:checked="${ws.sewingStyle.name() == 'SIMPLE'}"
                                       onchange="setSewingMode('SIMPLE')"/> Simple
                            </label>
                            <label class="radio-label">
                                <input type="radio" form="export-form" name="sewingStyle"
                                       value="BANDED"
                                       th:checked="${ws.sewingStyle.name() == 'BANDED'}"
                                       onchange="setSewingMode('BANDED')"/> Banded
                            </label>
                        </div>
                        <div id="sewingSimpleParams" class="sewing-field-group"
                             th:style="${ws.sewingStyle.name() == 'BANDED'} ? 'display:none' : ''">
                            <label class="field-label-sm">Holes</label>
                            <input type="number" form="export-form" name="sewingHoleCount"
                                   min="2" th:value="${ws.sewingHoleCount}" class="input-narrow"/>
                        </div>
                        <div id="sewingBandedParams" class="sewing-field-group"
                             th:style="${ws.sewingStyle.name() == 'SIMPLE'} ? 'display:none' : ''">
                            <label class="field-label-sm">Bands</label>
                            <input type="number" form="export-form" name="sewingBandCount"
                                   min="1" th:value="${ws.sewingBandCount}" class="input-narrow"/>
                            <label class="field-label-sm">Band width (mm)</label>
                            <input type="number" form="export-form" name="sewingBandWidthMm"
                                   min="1" step="0.5" th:value="${ws.sewingBandWidthMm}"
                                   class="input-narrow"/>
                        </div>
                        <div class="sewing-field-group">
                            <label class="field-label-sm">End margin (mm)</label>
                            <input type="number" form="export-form" name="sewingEndMarginMm"
                                   min="1" step="0.5" th:value="${ws.sewingEndMarginMm}"
                                   class="input-narrow"/>
                        </div>
                    </div>
                </div>

                <label class="checkbox-label">
                    <input type="checkbox" form="export-form" name="trimLines"
                           th:checked="${ws.trimLines}"/> Trim lines
                </label>

                <div th:if="${ws.paperThicknessMm > 0}" class="creep-section">
                    <hr class="creep-divider"/>
                    <label class="checkbox-label">
                        <input type="checkbox" form="export-form" name="applyCreep"
                               th:checked="${ws.applyCreep}"/>
                        Apply creep compensation
                    </label>
                    <p class="field-hint creep-hint"
                       th:text="'Paper thickness: ' + ${ws.paperThicknessMm} + ' mm'"></p>
                </div>
            </section>

            <!-- Middle: Page Numbering -->
            <section class="export-section">
                <h3 class="section-label">Page numbering</h3>
                <table class="numbering-table">
                    <thead>
                        <tr>
                            <th></th>
                            <th>Style</th>
                            <th>Start #</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="zone-label">Front matter</td>
                            <td>
                                <select form="export-form" name="frontFolioStyle" class="select-sm">
                                    <option th:each="s : ${folioStyles}"
                                            th:value="${s.name()}"
                                            th:text="${s.name()}"
                                            th:selected="${ws.frontMatterFolioStyle == s}">
                                    </option>
                                </select>
                            </td>
                            <td>
                                <input type="number" form="export-form"
                                       name="frontMatterStartNumber" min="1"
                                       th:value="${ws.frontMatterStartNumber}"
                                       class="input-narrow"/>
                            </td>
                        </tr>
                        <tr>
                            <td class="zone-label">Body</td>
                            <td>
                                <select form="export-form" name="bodyFolioStyle" class="select-sm">
                                    <option th:each="s : ${folioStyles}"
                                            th:value="${s.name()}"
                                            th:text="${s.name()}"
                                            th:selected="${ws.bodyFolioStyle == s}">
                                    </option>
                                </select>
                            </td>
                            <td>
                                <input type="number" form="export-form"
                                       name="bodyStartNumber" min="1"
                                       th:value="${ws.bodyStartNumber}"
                                       class="input-narrow"/>
                            </td>
                        </tr>
                        <tr>
                            <td class="zone-label">Rear matter</td>
                            <td>
                                <select form="export-form" name="rearFolioStyle" class="select-sm">
                                    <option th:each="s : ${folioStyles}"
                                            th:value="${s.name()}"
                                            th:text="${s.name()}"
                                            th:selected="${ws.rearMatterFolioStyle == s}">
                                    </option>
                                </select>
                            </td>
                            <td>
                                <input type="number" form="export-form"
                                       name="rearMatterStartNumber" min="1"
                                       th:value="${ws.rearMatterStartNumber}"
                                       class="input-narrow"/>
                            </td>
                        </tr>
                        <tr>
                            <td class="zone-label">Position</td>
                            <td colspan="2">
                                <select form="export-form" name="folioPosition" class="select-sm">
                                    <option th:each="p : ${folioPositions}"
                                            th:value="${p.name()}"
                                            th:text="${p.name()}"
                                            th:selected="${ws.folioPosition == p}">
                                    </option>
                                </select>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <label class="checkbox-label" style="margin-top:8px">
                    <input type="checkbox" form="export-form" name="suppressFirstFolio"
                           th:checked="${ws.suppressFirstFolio}"/>
                    Suppress folio on first page
                </label>
            </section>

            <!-- Right: Imposition Summary -->
            <section class="export-section export-section--table">
                <h3 class="section-label">Imposition summary</h3>
                <table class="summary-table" th:if="${not #lists.isEmpty(summary)}">
                    <thead>
                        <tr>
                            <th>Zone</th>
                            <th>#</th>
                            <th>Pages</th>
                            <th>Sheets</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="row : ${summary}">
                            <td th:text="${row.zone()}"></td>
                            <td th:text="${row.index()}"></td>
                            <td th:text="${row.pages()}"></td>
                            <td th:text="${row.sheets()}"></td>
                        </tr>
                    </tbody>
                </table>
                <p th:if="${#lists.isEmpty(summary)}" class="muted">No imposition result.</p>
            </section>

        </div>

        <!-- Download form (standard POST — browser handles the file download) -->
        <form id="export-form" method="post" th:action="@{/wizard/download}">
            <div class="step-actions step-actions--export">
                <button type="button" class="btn btn-secondary"
                        hx-post="/wizard/back/pages"
                        hx-target="#wizard-content"
                        hx-swap="innerHTML">← Back</button>
                <button type="submit" class="btn btn-primary btn-download">
                    ⬇ Download imposed PDF
                </button>
            </div>
        </form>

    </div>

    <script>
    function setSewingParamsVisible(visible) {
        document.getElementById('sewingParams').style.display = visible ? '' : 'none';
    }
    function setSewingMode(mode) {
        document.getElementById('sewingSimpleParams').style.display = mode === 'SIMPLE' ? '' : 'none';
        document.getElementById('sewingBandedParams').style.display = mode === 'BANDED'  ? '' : 'none';
    }
    </script>
</th:block>

</body>
</html>
