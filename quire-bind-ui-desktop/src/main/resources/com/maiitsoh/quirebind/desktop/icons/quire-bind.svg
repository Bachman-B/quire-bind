<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Blue rounded-square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#2563EB"/>

  <!-- Q ring — thick white circle, slightly above centre -->
  <circle cx="248" cy="232" r="126" fill="none" stroke="white" stroke-width="74"/>

  <!-- Q tail — bold diagonal stroke from lower-right of ring outward,
       ending in a short horizontal hook (binding thread / needle) -->
  <line x1="334" y1="310" x2="408" y2="384"
        stroke="white" stroke-width="70" stroke-linecap="round"/>
  <line x1="408" y1="384" x2="448" y2="384"
        stroke="white" stroke-width="56" stroke-linecap="round"/>
</svg>
