name: Bug report
description: Something is not working correctly
title: "[Bug]: "
labels: ["bug", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        Please fill in as much detail as you can — it helps us reproduce and fix the problem faster.

  - type: dropdown
    id: module
    attributes:
      label: Which part of Quire is affected?
      options:
        - Page preparation (add/remove/reorder)
        - Padding calculation (aesthetic or completion pages)
        - Imposition (page reordering for print)
        - Page numbering / folio overlay
        - Fold / sewing marks
        - Signature proof markers
        - Print preview
        - Binding guides
        - Batch processing (.quire file)
        - User preferences / settings
        - Desktop installer (Windows)
        - Desktop installer (macOS)
        - Desktop installer (Linux)
        - Web version
        - Other / unsure
    validations:
      required: true

  - type: dropdown
    id: binding-technique
    attributes:
      label: Which binding technique were you using? (if applicable)
      options:
        - Saddle stitch
        - Pamphlet
        - Booklet
        - Sewn signatures
        - Hardcover / case binding
        - Perfect binding
        - Coptic binding
        - Spiral / coil binding
        - Japanese stab binding
        - Not applicable
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of what went wrong.
      placeholder: "When I selected sewn signatures with a 17-page PDF and signature size 16, the app showed..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "I expected the app to add 15 completion pages to reach 32..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the problem.
      placeholder: |
        1. Open Quire
        2. Load a PDF with 17 pages
        3. Select 'Sewn signatures'
        4. Set signature size to 16
        5. Click Export
        6. See error...
    validations:
      required: true

  - type: textarea
    id: pdf-details
    attributes:
      label: PDF details (if relevant)
      description: Page count, page size, any unusual content. Do not attach real documents — a description is fine.
      placeholder: "17-page A4 PDF, mix of text and images, no existing page numbers"
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Quire version
      placeholder: "e.g. 1.0.0 — found in Help > About"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS 14 (Sonoma)
        - macOS 13 (Ventura)
        - macOS 12 (Monterey)
        - Ubuntu / Debian Linux
        - Fedora / RHEL Linux
        - Other Linux
        - Web browser (Chrome)
        - Web browser (Firefox)
        - Web browser (Safari)
        - Web browser (other)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log output or error message
      description: Paste any error message or log output here. Found in Help > Show Log File.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Screenshots, additional context, or anything else that might help.
    validations:
      required: false
