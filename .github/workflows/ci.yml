name: CI

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run all tests
        run: mvn verify -B

      - name: Generate Maven site
        if: github.ref == 'refs/heads/main'
        run: mvn site -B -DskipTests

      - name: Stage reports for GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/gh-pages/reports
          # Root redirect — forwards the bare site URL to /reports/
          cat > /tmp/gh-pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html><head>
          <meta http-equiv="refresh" content="0; url=reports/">
          <title>QuireBind Reports</title>
          </head><body>
          <p>Redirecting to <a href="reports/">reports</a>…</p>
          </body></html>
          EOF
          # Root aggregate site (index + module links)
          cp -r target/site/. /tmp/gh-pages/reports/
          # Per-module JaCoCo + Surefire reports
          for module in quire-bind-core quire-bind-batch quire-bind-guides quire-bind-test; do
            if [ -d "$module/target/site" ]; then
              mkdir -p "/tmp/gh-pages/reports/$module"
              cp -r "$module/target/site/." "/tmp/gh-pages/reports/$module/"
            fi
          done

      - name: Publish reports to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/gh-pages
          keep_files: false

  checkstyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check -B
